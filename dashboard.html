<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>EstateCRM | Dashboard</title>

    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            
            <div class="brand"> EstateCRM</div>

            <nav class="nav">
                <a href="dashboard.html" class="nav-link active"> Dashboard</a>
                <a href="properties.html" class="nav-link"> Properties</a>
                <a href="add-property.html" class="nav-link"> Add Property</a>
                <a href="leads.html" class="nav-link"> Leads</a>
                <a href="visits.html" class="nav-link"> Site Visits</a>
                <a href="deals.html" class="nav-link"> Deals</a>
                <a href="tasks.html" class="nav-link"> My Tasks</a>
                <a href="reports.html" class="nav-link"> Reports</a>
                <a href="index.html" class="nav-link"> Client Portal</a>
            </nav>

        </aside>

        <!-- MAIN CONTENT -->
        <div class="content">
            
            <header class="topbar">
                <h1>Welcome, Admin</h1>
            </header>

            <!-- STATS CARDS -->
            <div class="stat-grid">
                
                <div class="stat-card blue">
                    <h4>Total Active Leads</h4>
                    <p id="sLeads">24</p>
                </div>

                <div class="stat-card orange">
                    <h4>Upcoming Site Visits</h4>
                    <p id="sVisits">7</p>
                </div>

                <div class="stat-card green">
                    <h4>Deals Closed This Month</h4>
                    <p id="sDeals">12</p>
                </div>

                <div class="stat-card purple">
                    <h4>Monthly Sales Target</h4>
                    <p>68%</p>
                </div>

            </div>

            <!-- CHART -->
            <div class="card">
                <h3>Sales Pipeline</h3>
                <canvas id="pipelineChart" style="margin-top: 20px;"></canvas>
            </div>

        </div>

    </div>

    <script src="./script.js"></script>

</body>
</html>
